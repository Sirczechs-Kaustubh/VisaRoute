# Local PostgreSQL for Prisma (schema uses provider = "postgresql").
# From project root: docker compose up -d
# Then: npx prisma db push && npm run db:seed
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visaroute
    ports:
      - "5432:5432"
    volumes:
      - visaroute_pgdata:/var/lib/postgresql/data

volumes:
  visaroute_pgdata:
